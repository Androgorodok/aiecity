# Данные
data_dir: "./data/data"

# Модель
num_classes: 4
pretrained: true

# Обучение
epochs: 5
batch_size: 64
img_size: 224

# Оптимизация
learning_rate: 0.0001
weight_decay: 0.0001
label_smoothing: 0.1

# Scheduler
scheduler: cosine

# Артефакты
output_dir: "artifacts"
model_name: "best_model.pt"

# Device
device: auto
